<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сканер Data Matrix</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0; padding: 0;
            background: #000; color: white;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            max-width: 400px;
            height: auto;
            display: none;
        }
        button {
            background: #2AABEE;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }
        button:disabled {
            background: #666;
        }
        #result {
            font-size: 20px;
            font-weight: bold;
            word-break: break-all;
            margin: 20px;
            min-height: 30px;
        }
    </style>
</head>
<body>
    <h1>Сканер Data Matrix</h1>
    <video id="video" autoplay playsinline muted></video>
    <button id="start-btn">📷 Начать сканирование</button>
    <button id="stop-btn" style="display:none;">⏹️ Остановить</button>
    <p id="result"></p>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.2/umd/index.min.js"></script>
    <script src="scanner.js"></script>
</body>
</html>
