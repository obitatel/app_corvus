<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер Data Matrix</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        button {
            background: #2AABEE;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>Сканер Data Matrix</h1>
    <p>Нажмите кнопку и сфотографируйте код камерой</p>

    <!-- Скрытый input для захвата с камеры -->
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">

    <button id="scan-btn">📸 Сфотографировать Data Matrix</button>
    <p id="result"></p>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.2/umd/index.min.js"></script>
    <script src="scanner.js"></script>
</body>
</html>
