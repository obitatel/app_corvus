<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер Data Matrix</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        /* Стилизуем label как кнопку */
        .scan-label {
            display: inline-block;
            background: #2AABEE;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px 0;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            word-break: break-all;
        }
        /* Скрываем сам input */
        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Сканер Data Matrix</h1>
    <p>Сфотографируйте код стандартной камерой, затем нажмите кнопку и выберите снимок.</p>

    <!-- label активирует input -->
    <label for="file-input" class="scan-label" id="scan-label">📷 Загрузить фото Data Matrix</label>
    <input type="file" id="file-input" accept="image/*">

    <p id="result"></p>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.2/umd/index.min.js"></script>
    <script src="scanner.js"></script>
</body>
</html>
