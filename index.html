<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сканер QR-билетов</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
        }
        #camera-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        video {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
        }
        #zoom-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px;
        }
        input[type=range] {
            width: 200px;
        }
        button {
            background: #2AABEE;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        #capture-btn {
            font-size: 18px;
            padding: 15px 30px;
        }
        #result {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            word-break: break-all;
            background: rgba(0,0,0,0.7);
            text-align: center;
        }
        #crop-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #image-to-crop {
            max-width: 90%;
            max-height: 60vh;
        }
    </style>
</head>
<body>
    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <div id="zoom-controls">
            <button id="zoom-out">–</button>
            <input type="range" id="zoom-slider" min="1" max="8" step="0.1" value="1">
            <button id="zoom-in">+</button>
        </div>
        <button id="capture-btn">Сфотографировать и распознать</button>
    </div>
    <p id="result"></p>

    <!-- Контейнер для кадрирования -->
    <div id="crop-container">
        <img id="image-to-crop" alt="Обрезка">
        <div>
            <button id="crop-scan-btn">Сканировать выделенное</button>
            <button id="cancel-crop-btn">Отмена</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="scanner.js"></script>
</body>
</html>
