<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DataMatrix Scanner</title>
    <style>
        /* Базовые сбросы и стили */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            padding: 20px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 16px;
            color: #1a1a1a;
        }
        /* Контейнер для видео */
        #video-container {
            position: relative;
            width: 100%;
            padding-top: 75%; /* Соотношение 4:3 */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Оверлей статуса */
        #scan-status {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            white-space: nowrap;
            transition: background 0.3s;
        }
        /* Результат */
        #result-area {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            min-height: 50px;
            font-size: 14px;
            word-break: break-all;
        }
        #result-text {
            color: #0d6efd;
            font-weight: 500;
        }
        /* Кнопки */
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            flex: 1 1 auto;
            min-width: 80px;
        }
        .btn-primary {
            background: #0088cc;
            color: white;
        }
        .btn-primary:hover {
            background: #006699;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background: #b02a37;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover {
            background: #1e7e34;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #send-data-btn {
            display: none; /* скрыта до получения результата */
        }
        #switch-camera-btn {
            display: none; /* показывается, если доступно несколько камер */
        }
        /* Адаптив */
        @media (max-width: 480px) {
            .container { padding: 12px; }
            h1 { font-size: 18px; }
            .btn { font-size: 14px; padding: 10px 14px; min-width: 60px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📷 Сканер Data Matrix</h1>

    <!-- Видео-контейнер -->
    <div id="video-container">
        <video id="video" playsinline></video>
        <div id="scan-status">Готов к работе</div>
    </div>

    <!-- Область результата -->
    <div id="result-area">
        <span id="result-text">Отсканированный код появится здесь</span>
    </div>

    <!-- Кнопки управления -->
    <div class="button-group">
        <button id="start-btn" class="btn btn-primary">▶ Запустить</button>
        <button id="stop-btn" class="btn btn-danger" disabled>⏹ Остановить</button>
        <button id="switch-camera-btn" class="btn btn-secondary">🔄 Камера</button>
        <button id="send-data-btn" class="btn btn-success">📤 Отправить</button>
    </div>
</div>

<!-- Telegram Web App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- ZXing библиотека (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.23.0/umd/index.min.js"></script>

<!-- Наш основной скрипт (scanner.js) -->
<script src="scanner.js"></script>

</body>
</html>
