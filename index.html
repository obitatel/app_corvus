<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер Data Matrix</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        button {
            background: #2AABEE;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            word-break: break-all;
        }
        #crop-container {
            display: none;
            margin: 10px auto;
            max-width: 100%;
        }
        #image-to-crop {
            max-width: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <h1>Сканер Data Matrix</h1>
    <p>Сфотографируйте код, затем обведите и нажмите «Сканировать»</p>

    <button id="upload-btn">📁 Загрузить фото Data Matrix</button>

    <div id="crop-container">
        <img id="image-to-crop" alt="Обрезка">
        <br>
        <button id="crop-scan-btn">🔍 Сканировать выделенное</button>
        <button id="cancel-crop-btn">↩️ Отмена</button>
    </div>

    <p id="result"></p>

    <!-- Скрытый div для Html5Qrcode (обязателен) -->
    <div id="reader" style="display:none;"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="scanner.js"></script>
</body>
</html>
