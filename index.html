<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лотерейный сканер</title>
</head>
<body>
    <h1>Привет, участник лотереи!</h1>
    <p id="user-info">Загрузка...</p>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // Сообщаем Telegram, что приложение готово
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-info').innerText =
                `Вы: ${user.first_name} ${user.last_name || ''} (@${user.username || 'нет'})`;
        } else {
            document.getElementById('user-info').innerText =
                'Не удалось получить данные пользователя. Откройте приложение из Telegram.';
        }
    </script>
</body>
</html>
