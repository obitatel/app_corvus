<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер QR-билетов</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        button {
            background: #2AABEE;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        button:disabled {
            background: #aaa;
        }
        #result {
            margin: 20px;
            font-size: 18px;
            font-weight: bold;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>Сканер лотерейных билетов</h1>
    <p>Сфотографируйте QR-код на камеру телефона, затем загрузите снимок</p>

    <button id="upload-btn">Загрузить фото QR-кода</button>

    <p id="result"></p>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="scanner.js"></script>
</body>
</html>
